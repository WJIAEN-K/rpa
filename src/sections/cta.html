<!-- CTA -->
<section class="cta-section" id="contact">
  <div class="container">
    <div class="cta-content fade-up">
      <div class="section-label">联系我</div>
      <h2 class="cta-title">选择你最顺手的沟通方式</h2>
      <p class="cta-desc">扫码直聊、提交飞书表单、或邮件咨询，三种方式都可以快速对接需求。</p>
      <div class="cta-bridge-grid">
        <article class="cta-bridge-card">
          <p class="cta-bridge-kicker">微信直聊</p>
          <h3 class="cta-bridge-title">扫码直接沟通</h3>
          <div class="cta-qr-shell">
            <img
              src="https://imgdata.cn-nb1.rains3.com/img/ma.png"
              data-fallback-src="./src/img/ma.png"
              alt="微信二维码（srhd0000）"
              loading="lazy"
              decoding="async"
            >
          </div>
          <div class="cta-wechat-meta">
            <button type="button" class="cta-inline-copy" onclick="copyContact(event, 'srhd0000')">srhd0000</button>
          </div>
        </article>
        <article class="cta-bridge-card">
          <p class="cta-bridge-kicker">飞书表单</p>
          <h3 class="cta-bridge-title">结构化提交需求</h3>
          <p class="cta-bridge-desc">适合明确场景、预算和交付时间的需求，便于我快速评估并回复方案。</p>
          <a href="https://fcnxr121galn.feishu.cn/share/base/form/shrcna0JbQXbX0rWi34zRODuLNc" target="_blank" rel="noopener noreferrer" class="btn-primary cta-bridge-btn">填写飞书表单</a>
        </article>
        <article class="cta-bridge-card">
          <p class="cta-bridge-kicker">邮件咨询</p>
          <h3 class="cta-bridge-title">输入邮箱后一键发信</h3>
          <form class="cta-form" id="cta-form" novalidate>
            <label class="cta-label" for="cta-user-email">您的邮箱</label>
            <div class="cta-form-row">
              <input type="email" class="cta-input" id="cta-user-email" name="email" placeholder="you@example.com" autocomplete="email" inputmode="email" aria-describedby="cta-form-error" aria-invalid="false">
            </div>
            <p class="cta-form-error" id="cta-form-error" role="alert" aria-live="polite"></p>
            <p class="cta-mail-fallback">我们的邮箱：
              <button type="button" class="cta-inline-copy" onclick="copyEmail(event)">wakeupgyh@163.com</button>
            </p>
            <button type="submit" class="btn-primary cta-submit cta-bridge-btn">发起邮件咨询</button>
          </form>
        </article>
      </div>
      <p class="cta-note">建议附上：业务场景 · 当前痛点 · 期望效果 · 预算范围</p>
    </div>
  </div>
</section>
