<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#08080f" id="theme-color-meta">
<script>
(function () {
  var KEY = 'auto-flow-theme-pref';
  var stored = null;
  try { stored = localStorage.getItem(KEY); } catch (e) {}
  var darkMq = window.matchMedia('(prefers-color-scheme: dark)');
  var effective = (stored === 'light' || stored === 'dark')
    ? stored
    : (darkMq.matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', effective);
  document.documentElement.setAttribute('data-theme-pref', stored === 'light' || stored === 'dark' ? stored : 'system');
  var meta = document.getElementById('theme-color-meta');
  if (meta) meta.setAttribute('content', effective === 'dark' ? '#08080f' : '#f8fafc');
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="color-scheme" content="light dark">
